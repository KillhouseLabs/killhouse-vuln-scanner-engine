name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

  test:
    name: Tests
    needs: quality
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ci-test-key
      SCANNER_API_KEY: ci-test-key
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: pytest -m "not integration" --cov=src --cov-report=term-missing -v

  build:
    name: Build Docker Image
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.api -t killhouse-scanner-engine:ci .

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    uses: KillhouseLabs/.github/.github/workflows/deploy.yml@main
    with:
      service_name: scanner-api
      dockerfile: Dockerfile.api
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read
